name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Syntax check
        run: |
          python -m py_compile app/rag_engine.py app/agent.py app/main.py run_eval.py scripts/build_vectordb.py

  # 完整 eval 需要 Ollama，CI 默认只跑语法检查
  # 本地评测：python run_eval.py
